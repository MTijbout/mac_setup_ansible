# vars.yml
# --- Tasks and Application Configuration Toggles ---
setup_ssh_github: false
setup_homebrew: true
setup_app_conf: false
setup_dotfiles: false

# VS Code Configuration. Requires: setup_app_conf: true
setup_vscode_extensions: true
setup_vscode_user_settings: false
setup_vscode_file_handling: true
# SSH Client Configuration. Requires: setup_app_conf: true
setup_ssh_conf: true
setup_ssh_conf_hashknownhosts: true   # Requires: setup_ssh_conf: true
# iTerm2 Configuration. Requires: setup_app_conf: true
setup_iterm2: false
# espanso Configuration. Requires: setup_app_conf: true
setup_espanso: false
# Dock Configuration
setup_dock: true

# --- GitHub Repository Details ---
# SSH key for accessing (private) GitHub repositories
ssh_key_path: "{{ ansible_facts['user_dir'] }}/.ssh/id_github_mtijbout_sparky_user_auth"

# Base directory for all repos
github_base_dir: "{{ ansible_facts['user_dir'] }}/GitHub"

# --- Repositories and Destinations ---
# Dotfiles Repository
dotfiles_repo: "git@github.com:MTijbout/dotfiles.git"
dotfiles_dest: "{{ github_base_dir }}/dotfiles"

# Configurations Repository
configs_repo: "git@github.com:MTijbout/configurations.git"
configs_dest: "{{ github_base_dir }}/configurations"

# --- Application-Specific Variables ---
# Config Sources (configurations repo)

# VScode
vscode_config_dir: "{{ ansible_facts['user_dir'] }}/Library/Application Support/Code/User"
vscode_settings_file: "{{ configs_dest }}/vscode/settings.json"

# iTerm2
iterm_config_dir: "{{ ansible_facts['user_dir'] }}/.config/iterm2"
iterm_config_file: "com.googlecode.iterm2.plist"
iterm_background_file: "black_paper.jpg"
iterm_repo_src: "{{ configs_dest }}/iterm2/"

# espanso (Dropbox)
espanso_dropbox_path: "{{ ansible_facts['user_dir'] }}/Dropbox/espanso"
espanso_macos_config_path: "{{ ansible_facts['user_dir'] }}/Library/Application Support/espanso"

# Apps to add to the Dock (in order)
# - Options: position, after, before (omit for end)
# - Values: beginning, end, middle, <numeric index>, or <label>
dock_apps:
  - label: "Obsidian"
    path: "/Applications/Obsidian.app"
    position_type: "position"   
    position_value: "1"

  - label: "Google Chrome"
    path: "/Applications/Google Chrome.app"
    position_type: "after"
    position_value: "Obsidian"

  - label: "Visual Studio Code"
    path: "/Applications/Visual Studio Code.app"
    position_type: "after"
    position_value: "Google Chrome"

  - label: "iTerm"
    path: "/Applications/iTerm.app"
    position_type: "after"
    position_value: "Visual Studio Code"

# --- Lists for Looping ---
# Homebrew Casks (GUI applications)
homebrew_casks: 
  - espanso
  - iterm2
  - visual-studio-code
  - google-chrome
  - font-jetbrains-mono
  - obsidian
  - signal

# Homebrew Formulas (CLI tools)
homebrew_packages:
  - dockutil
  - node

# VS Code Extensions
vscode_extensions: 
  - redhat.ansible
  - ms-python.python
  - eamodio.gitlens
  - esbenp.prettier-vscode
  - pomdtr.excalidraw-editor

# Dotfiles to Symlink
dotfiles_to_link: 
  - .aliases-darwin
  - .vimrc
  - .gitconfig
  - .gitignore_global

# iTerm2 files to symlink
iterm_files_to_link: 
  - com.googlecode.iterm2.plist
  - black_paper.jpg

# VS Code - File Handling
vscode_file_handling:
  - md
  - public.json # UTI: JSON (more reliable than just 'json')
  - public.yaml # UTI: YAML (more reliable than just 'yaml')
  - yml
