# tasks/ssh_config.yml
---
- name: Configure user-specific SSH HashKnownHosts
  block:
    - name: Ensure ~/.ssh directory exists with correct permissions
      ansible.builtin.file:
        path: "{{ ansible_facts['user_dir'] }}/.ssh"
        state: directory
        mode: '0700'

    - name: Set HashKnownHosts in user ssh_config
      ansible.builtin.lineinfile:
        path: "{{ ansible_facts['user_dir'] }}/.ssh/config"
        # Regex finds the line whether it's commented out or set to 'no'
        regexp: '^[#\s]*HashKnownHosts\s+'
        line: 'HashKnownHosts yes'
        create: true
        mode: '0600'
  # This block only runs if your variable is true
  when: setup_ssh_conf_hashknownhosts | default(false) | bool
