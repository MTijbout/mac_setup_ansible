# tasks/ssh_config.yml
---
- name: Configure user-specific SSH HashKnownHosts
  block:
    - name: Ensure ~/.ssh directory exists with correct permissions
      ansible.builtin.file:
        path: "{{ ansible_facts['user_dir'] }}/.ssh"
        state: directory
        mode: '0700'

    - name: Ensure Host * header exists
      ansible.builtin.lineinfile:
        path: "{{ ansible_facts['user_dir'] }}/.ssh/config"
        line: 'Host *'
        state: present
        create: yes
        mode: '0600'
        # Ensures 'Host *' is at the very top if created, 
        # or stays where it is if it already exists.
        insertbefore: BOF 

    - name: Ensure HashKnownHosts is set inside the Host * block
      ansible.builtin.lineinfile:
        path: "{{ ansible_facts['user_dir'] }}/.ssh/config"
        # 1. Look for the start of the 'Host *' block
        insertafter: '^Host \*'
        # 2. Match any existing HashKnownHosts line (indented or commented)
        regexp: '^[#\s]*HashKnownHosts\s+'
        # 3. Ensure it is indented with two spaces
        line: '  HashKnownHosts yes'
        create: yes
        mode: '0600'

  # This block only runs if your variable is true
  when: setup_ssh_conf_hashknownhosts | default(false) | bool
